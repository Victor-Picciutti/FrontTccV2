<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstudeX | Dúvidas</title>
    <link rel="stylesheet" href="../CSS/duvidas.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/themes.css">
</head>
<body>

    <section class="user-dashboard">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-bars menu-icon" id="menu-toggle"></i>
                <span class="logo-text">EstudeX</span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="../../../Home/HTML/home-Estudex.html" class="nav-item"><i class="fas fa-home"></i> <span>Home</span></a></li>
                    <li><a href="../../perfil/HTML/perfil-Estudex.html" class="nav-item"><i class="fas fa-user"></i> <span>Perfil</span></a></li>
                    <li><a href="../../duvidas/HTML/duvidas-Estudex.html" class="nav-item"><i class="fas fa-question-circle"></i> <span>Dúvidas</span></a></li>
                    <li><a href="../../atividade/HTML/atividades-Estudex.html" class="nav-item"><i class="fas fa-tasks"></i> <span>Atividades</span></a></li>
                    <li><a href="../../desempenho/HTML/desempenho-Estudex.html" class="nav-item"><i class="fas fa-chart-line"></i> <span>Desempenho</span></a></li>
                    <li><a href="../../enem/HTML/enem.html" class="nav-item"><i class="fas fa-book"></i> <span>Enem</span></a></li>
                </ul>
            </nav>
            
        </div>

      
        <main class="dashboard-content">
            <h1 class="page-title">Dúvidas</h1>

            <div class="duvidas-grid">
                
                <!-- COLUNA ESQUERDA: FORMULÁRIO E MINHAS DÚVIDAS -->
                <div class="main-column">
                    
                    <!-- FORMULÁRIO DE ENVIO DE DÚVIDA -->
                    <div class="data-card form-card">
                        <h2 class="card-title"><i class="fas fa-paper-plane"></i> Enviar Nova Dúvida</h2>
                        <form class="doubt-form">
                            <div class="input-group">
                                <input type="text" id="doubt-title" placeholder=" " required>
                                <label for="doubt-title">Título da Dúvida</label>
                            </div>
                            <div class="input-group full-width">
                                <textarea id="doubt-content" rows="5" placeholder=" " required></textarea>
                                <label for="doubt-content">Descreva sua Dúvida (máx. 500 caracteres)</label>
                            </div>
                            <button type="submit" class="btn-primary">Enviar Dúvida <i class="fas fa-arrow-right"></i></button>
                        </form>
                    </div>

                    <!-- MINHAS DÚVIDAS -->
                    <div class="data-card my-doubts-card">
                        <h2 class="card-title"><i class="fas fa-history"></i> Minhas Dúvidas</h2>
                        
                        <div class="doubt-list">
                            <!-- Card 1: Respondida -->
                            <div class="doubt-item answered">
                                <div class="doubt-info">
                                    <i class="fas fa-question-circle doubt-icon"></i>
                                    <span class="doubt-title-text">Como calcular a integral de linha?</span>
                                </div>
                                <div class="doubt-actions">
                                    <span class="doubt-status">Respondida</span>
                                    <button class="btn-view-answer">Ver Resposta</button>
                                </div>
                            </div>

                            <!-- Card 2: Em Análise -->
                            <div class="doubt-item pending">
                                <div class="doubt-info">
                                    <i class="fas fa-question-circle doubt-icon"></i>
                                    <span class="doubt-title-text">Qual a diferença entre Java e JavaScript?</span>
                                </div>
                                <div class="doubt-actions">
                                    <span class="doubt-status">Em Análise</span>
                                    <button class="btn-view-answer disabled">Ver Resposta</button>
                                </div>
                            </div>

                            <!-- Card 3: Respondida -->
                            <div class="doubt-item answered">
                                <div class="doubt-info">
                                    <i class="fas fa-question-circle doubt-icon"></i>
                                    <span class="doubt-title-text">Teorema de Pitágoras em 3D?</span>
                                </div>
                                <div class="doubt-actions">
                                    <span class="doubt-status">Respondida</span>
                                    <button class="btn-view-answer">Ver Resposta</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

               
        </main>
    </section>
    
    <!-- Scripts -->
    <script src="../JS/duvidas.js"></script>
    <script src="../JS/themes.js"></script>

</body>
</html>
