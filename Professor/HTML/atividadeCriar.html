<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EstudeX – Criar Questão</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../CSS/atividadeCriar.css">
</head>

<body>

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      </div>
      <span class="logo-name">Estude<em>X</em></span>
      <span class="logo-badge">Prof</span>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4" />
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
        </svg>
        Perfil
      </a>
      <a class="nav-item active" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
        Atividades
      </a>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Turmas
      </a>
    </nav>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">



    <!-- PROGRESSO -->
    <div style="padding: 0 4px;">
      <span id="questao-numero"
        style="font-size:13px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;"></span>
      <div style="margin-top: 8px; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden;">
        <div id="questao-progress"
          style="height: 100%; background: linear-gradient(90deg, var(--accent), #ff55dd); border-radius: 99px; transition: width .4s ease; width: 10%;">
        </div>
      </div>
    </div>

    <!-- BANNER -->
    <div class="page-banner">
      <div class="banner-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
      </div>
      <div class="banner-text">
        <h1>✦ Criar Nova Questão</h1>
        <p>Preencha o enunciado e adicione as alternativas da questão</p>
      </div>
    </div>

    <!-- TÍTULO DA ATIVIDADE -->
    <div class="atividade-titulo-container">

      <div class="card-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16v16H4z" />
          <line x1="4" y1="9" x2="20" y2="9" />
        </svg>
        Título da Atividade
      </div>

      <label class="field-label">
        Título <span class="required">*</span>
      </label>

      <input type="text" id="titulo" class="input-titulo" placeholder="Digite o título da atividade...">

    </div>

    <!-- CARD PRINCIPAL -->
    <div class="card">

      <div class="card-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
        Enunciado da Questão
      </div>

      <div class="field-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
          <polyline points="10 9 9 9 8 9" />
        </svg>
        Enunciado <span class="required">*</span>
      </div>

      <textarea class="input-enunciado" id="enunciado" placeholder="Digite o enunciado da questão..."></textarea>

      <div class="divider"></div>

      <!-- OPÇÕES -->
      <div class="opcoes-header">
        <div class="card-section-title" style="margin-bottom:0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 11 12 14 22 4" />
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
          </svg>
          Alternativas
        </div>
        <span class="opcoes-count" id="count-label">1 / 5</span>
      </div>

      <div id="opcoes-container"></div>

      <button class="btn-add" onclick="adicionarOpcao()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Adicionar alternativa
      </button>

      <!-- FOOTER -->
      <div class="card-footer">
        <button class="btn btn-cancel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
          Cancelar
        </button>
        <button class="btn btn-finalizar" onclick="finalizarAtividade()">
          Finalizar Atividade
        </button>
        <button class="btn btn-primary" id="btn-salvar" onclick="salvarQuestao()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
          Próxima Questão
        </button>
      </div>
    </div>
  </main>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="20 6 9 17 4 12" />
    </svg>
    <span id="toast-msg">Questão salva com sucesso!</span>
  </div>

</body>
<script src="../JS/atividadeCriar.js"></script>

</html>
